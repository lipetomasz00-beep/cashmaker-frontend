<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CashMaker AI</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0b0f;
  color:white;
  text-align:center;
}

.container{
  padding:20px;
}

h1{
  font-size:26px;
}

button{
  padding:15px 25px;
  font-size:18px;
  border:none;
  border-radius:10px;
  background:#e11d48;
  color:white;
  margin-top:20px;
  cursor:pointer;
}

.hidden{
  display:none;
}

.progress{
  height:6px;
  background:#222;
  margin:20px 0;
  border-radius:10px;
  overflow:hidden;
}

.bar{
  height:100%;
  width:0%;
  background:#e11d48;
  transition:0.3s;
}

.card{
  background:#12121a;
  padding:20px;
  border-radius:15px;
  margin-top:20px;
}

.counter{
  position:fixed;
  bottom:15px;
  left:50%;
  transform:translateX(-50%);
  background:#111;
  padding:8px 16px;
  border-radius:10px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<h1>Sprawdź swoją ofertę</h1>

<div class="progress"><div class="bar" id="bar"></div></div>

<!-- QUIZ -->
<div id="quiz">

<p>Na co potrzebujesz pieniędzy?</p>
<select id="goal">
  <option value="cash">Szybka gotówka</option>
  <option value="debt">Spłata długów</option>
  <option value="car">Samochód</option>
</select>

<p>Ile potrzebujesz?</p>
<select id="amount">
  <option value="small">do 3k</option>
  <option value="medium">3k-10k</option>
  <option value="big">10k+</option>
</select>

<p>Jak szybko?</p>
<select id="time">
  <option value="fast">Dziś</option>
  <option value="normal">Kilka dni</option>
</select>

<p>Twoja zdolność?</p>
<select id="score">
  <option value="good">Dobra</option>
  <option value="bad">Słaba</option>
</select>

<button onclick="startProcess()">Sprawdź</button>

</div>

<!-- LOADING -->
<div id="loading" class="hidden">
  <h2>Analizujemy Twoje dane...</h2>
  <p>Sprawdzamy oferty banków...</p>
</div>

<!-- WYNIK -->
<div id="result" class="hidden">

<div class="card">
  <h2>🎯 Dopasowaliśmy ofertę</h2>
  <p>Pożyczka do 10 000 zł</p>

  <p>✔ Decyzja nawet dziś</p>
  <p>✔ Wysoka szansa: 87%</p>
</div>

<button onclick="goOffer()">👉 Przejdź do oferty</button>

</div>

</div>

<div class="counter">
  <span id="count">147</span> osób teraz sprawdza
</div>

<script>

let progress = 0

function startProcess(){

  document.getElementById("quiz").classList.add("hidden")
  document.getElementById("loading").classList.remove("hidden")

  let interval = setInterval(()=>{

    progress += 10
    document.getElementById("bar").style.width = progress + "%"

    if(progress >= 100){
      clearInterval(interval)

      document.getElementById("loading").classList.add("hidden")
      document.getElementById("result").classList.remove("hidden")
    }

  }, 200)

}

function goOffer(){

  const goal = document.getElementById("goal").value
  const amount = document.getElementById("amount").value
  const time = document.getElementById("time").value
  const score = document.getElementById("score").value

  window.location.href =
    "/?goal="+goal+"&amount="+amount+"&time="+time+"&score="+score
}

// licznik
let c = 147
setInterval(()=>{
  c += Math.floor(Math.random()*3)
  document.getElementById("count").innerText = c
},2000)

</script>

</body>
</html>
